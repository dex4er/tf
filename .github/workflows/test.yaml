name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Test

    permissions:
      id-token: write
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: terraform
          - tool: opentofu

    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Git tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Terraform
        if: matrix.tool == 'terraform'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0 # datasource=github-releases depName=hashicorp/terraform
          terraform_wrapper: false

      - name: Set up OpenTofu
        if: matrix.tool == 'opentofu'
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6 # datasource=github-releases depName=opentofu/opentofu
          tofu_wrapper: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: 2.15.4 # datasource=github-releases depName=goreleaser/goreleaser
          args: build --clean --snapshot --single-target --output tf

      - name: Run tests
        run: make test
