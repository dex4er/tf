version: 0.1
cli:
  version: 1.25.0
lint:
  enabled:
    - actionlint@1.7.12
    - git-diff-check@SYSTEM
    - gitleaks@8.30.1
    - gofmt@1.20.4
    - golangci-lint2@2.12.2
    - markdownlint@0.49.0
    - prettier@3.9.4
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - terraform@1.15.6 # datasource=github-releases depName=hashicorp/terraform
    - tflint@0.63.1
    - tfsec@1.28.14
    - trufflehog@3.95.7
    - yamlfmt@0.21.0
    - yamllint@1.38.0
  disabled:
    - checkov
    - gokart
    - grype
    - osv-scanner
    - pinact
    - renovate
    - terrascan
    - trivy
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.26.4 # datasource=golang-version depName=go
    - node@22.16.0
    - python@3.14.4
