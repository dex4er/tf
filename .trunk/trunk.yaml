version: 0.1
cli:
  version: 1.25.0
lint:
  enabled:
    - actionlint@1.7.12
    - git-diff-check@SYSTEM
    - gitleaks@8.30.1
    - gofmt@1.20.4
    - golangci-lint2@2.12.1
    - markdownlint@0.48.0
    - prettier@3.8.3
    - renovate@43.150.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - terraform@1.15.0 # datasource=github-releases depName=hashicorp/terraform
    - tflint@0.62.0
    - tfsec@1.28.14
    - trufflehog@3.95.2
    - yamlfmt@0.21.0
    - yamllint@1.38.0
  disabled:
    - checkov
    - gokart
    - grype
    - osv-scanner
    - terrascan
    - trivy
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.26.2 # datasource=golang-version depName=go
    - node@22.16.0
    - python@3.14.4
